<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="sidepanel.css" />
</head>
<body>
  <header>
    <h1>Work <span class="x">&times;</span> English</h1>
  </header>

  <div id="video-info" class="muted">Open a YouTube video, then analyze it.</div>

  <button id="analyze-btn" disabled>Analyze this video</button>
  <div id="status" class="status" hidden></div>

  <div id="results" hidden>
    <section id="summary-sec" hidden>
      <h2>Summary</h2>
      <p id="summary"></p>
    </section>

    <section id="insights-sec" hidden>
      <h2>Insights</h2>
      <div id="insights"></div>
      <h3 id="q-head" hidden>Questions to reflect on</h3>
      <ul id="questions"></ul>
    </section>

    <section id="expr-sec" hidden>
      <h2>English Expressions</h2>
      <div id="expressions"></div>
    </section>
  </div>

  <footer>
    <label for="backend-url">Backend</label>
    <input id="backend-url" type="text" placeholder="http://localhost:5001" spellcheck="false" />
  </footer>

  <script src="sidepanel.js"></script>
</body>
</html>
